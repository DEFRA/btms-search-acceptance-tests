name: Run Journey Tests on GitHub

permissions:
  checks: write
  pull-requests: write

on:
  workflow_dispatch:
  workflow_call:
jobs:
  build:
    name: run-tests
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout btms frontend
        uses: actions/checkout@v4
        with:
          repository: DEFRA/btms-portal-frontend
          path: btms-portal-frontend

      - name: Build and run frontend in docker
        run: |
          cd btms-portal-frontend
          docker image pull localstack/localstack:3.0.2
          docker image pull redis:7.2.3-alpine3.18
          docker image pull mongo:6.0.13
          docker compose up -d
          echo "***DONE***"

      - name: Check portl frontend is running
        run:
          curl -o /dev/null -s -w "%{http_code}\n" http://localhost:3000/search

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup the tests
        run: npm i

      - name: Start docker compose
        run:
          pwd
          docker compose up --wait-timeout 300 -d --quiet-pull

      - name: Run the tests
#        env:
#          BROWSERSTACK_USER: ${{ secrets.BROWSERSTACK_USER }}
#          BROWSERSTACK_KEY: ${{ secrets.BROWSERSTACK_KEY }}
        run: |
          ENVIRONMENT=local npm run test:local

      - name: upload artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: ./allure-report
      - name: debug
        if: failure()
        run: |
          docker compose logs > logs.txt
          docker ps
